<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Simple — Verb List A2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f3ef;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 40px;
  }

  .label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    color: #1a1a1a;
    line-height: 1.2;
  }

  h1 span { color: #c0392b; }

  .subtitle {
    margin-top: 10px;
    font-size: 14px;
    color: #777;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid #d0ccc4;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  button:hover { background: #eceae4; }
  button.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

  .table-wrap {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #e2dfd8;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
    padding: 14px 24px;
    text-align: left;
    background: #faf9f6;
    border-bottom: 1px solid #e2dfd8;
  }

  tbody tr {
    border-bottom: 1px solid #f0ede7;
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf9f6; }

  .type-badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
    font-weight: 500;
  }

  .irreg { background: #fdecea; color: #c0392b; }
  .reg   { background: #eaf3e8; color: #2e7d32; }

  td {
    padding: 14px 24px;
    font-size: 15px;
  }

  td:first-child { font-weight: 500; }

  .past-cell {
    position: relative;
  }

  .past-text {
    font-weight: 500;
    color: #c0392b;
    transition: opacity 0.2s;
  }

  .past-text.hidden { opacity: 0; }

  .reveal-hint {
    font-size: 12px;
    color: #bbb;
    font-style: italic;
  }

  .reveal-hint.hidden { display: none; }

  footer {
    margin-top: 28px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <p class="label">A2 Level · Gabriel Turner</p>
    <h1>Past <span>Simple</span><br>Verb Reference</h1>
    <p class="subtitle">30 verbs — regular & irregular. Click REVEAL to show past forms.</p>
  </header>

  <div class="controls">
    <button id="btn-reveal" onclick="revealAll()">Reveal all</button>
    <button id="btn-hide" onclick="hideAll()">Hide all</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Present</th>
          <th>Past simple <span style="cursor:pointer; color:#c0392b;" onclick="revealAll()">— reveal ↓</span></th>
        </tr>
      </thead>
      <tbody id="verb-table"></tbody>
    </table>
  </div>

  <footer>Click any row to reveal / hide · Gabriel Turner · Inglés para industria y negocios</footer>
</div>

<script>
const verbs = [
  { present: "be",          past: "was / were",  type: "irreg" },
  { present: "buy",         past: "bought",       type: "irreg" },
  { present: "come",        past: "came",         type: "irreg" },
  { present: "do",          past: "did",          type: "irreg" },
  { present: "give",        past: "gave",         type: "irreg" },
  { present: "have",        past: "had",          type: "irreg" },
  { present: "get",         past: "got",          type: "irreg" },
  { present: "make",        past: "made",         type: "irreg" },
  { present: "sleep",       past: "slept",        type: "irreg" },
  { present: "write",       past: "wrote",        type: "irreg" },
  { present: "read",        past: "read",         type: "irreg" },
  { present: "go",          past: "went",         type: "irreg" },
  { present: "put",         past: "put",          type: "irreg" },
  { present: "take",        past: "took",         type: "irreg" },
  { present: "wake up",     past: "woke up",      type: "irreg" },
  { present: "understand",  past: "understood",   type: "irreg" },
  { present: "sell",        past: "sold",         type: "irreg" },
  { present: "see",         past: "saw",          type: "irreg" },
  { present: "speak",       past: "spoke",        type: "irreg" },
  { present: "work",        past: "worked",       type: "reg" },
  { present: "watch",       past: "watched",      type: "reg" },
  { present: "talk",        past: "talked",       type: "reg" },
  { present: "visit",       past: "visited",      type: "reg" },
  { present: "call",        past: "called",       type: "reg" },
  { present: "finish",      past: "finished",     type: "reg" },
  { present: "open",        past: "opened",       type: "reg" },
  { present: "close",       past: "closed",       type: "reg" },
  { present: "help",        past: "helped",       type: "reg" },
  { present: "arrive",      past: "arrived",      type: "reg" },
  { present: "start",       past: "started",      type: "reg" },
];

const tbody = document.getElementById('verb-table');

verbs.forEach((v, i) => {
  const tr = document.createElement('tr');
  tr.style.cursor = 'pointer';
  tr.innerHTML = `
    <td>
      ${v.present}
      <span class="type-badge ${v.type}">${v.type === 'irreg' ? 'irregular' : 'regular'}</span>
    </td>
    <td class="past-cell">
      <span class="past-text hidden" id="past-${i}">${v.past}</span>
      <span class="reveal-hint" id="hint-${i}">tap to reveal</span>
    </td>
  `;
  tr.addEventListener('click', () => toggleRow(i));
  tbody.appendChild(tr);
});

function toggleRow(i) {
  const past = document.getElementById(`past-${i}`);
  const hint = document.getElementById(`hint-${i}`);
  const hidden = past.classList.contains('hidden');
  past.classList.toggle('hidden', !hidden);
  hint.classList.toggle('hidden', hidden);
}

function revealAll() {
  verbs.forEach((_, i) => {
    document.getElementById(`past-${i}`).classList.remove('hidden');
    document.getElementById(`hint-${i}`).classList.add('hidden');
  });
}

function hideAll() {
  verbs.forEach((_, i) => {
    document.getElementById(`past-${i}`).classList.add('hidden');
    document.getElementById(`hint-${i}`).classList.remove('hidden');
  });
}
</script>

</body>
</html>
